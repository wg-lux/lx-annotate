stages:
  - build
  - deploy

build_package:
  stage: build
  image: python:3.11-slim
  script:
    - pip install build
    - python -m build
  artifacts:
    paths:
      - dist/

deploy_to_test_pypi:
  stage: deploy
  image: python:3.11-slim
  environment:
    name: test-release
  dependencies:
    - build_package
  id_tokens:
    TESTPYPI_ID_TOKEN:
      aud: testpypi
  script:
    - pip install twine
    - python -m twine upload -r testpypi dist/* --verbose
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'  # Triggers only on semantic version tags (e.g., v0.1.0)