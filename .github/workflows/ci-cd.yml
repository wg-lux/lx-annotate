name: CI/CD

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install backend dependencies
        run: uv sync --dev

      - name: Run backend tests
        env:
          DJANGO_SETTINGS_MODULE: lx_annotate.settings.settings_test
        run: uv run pytest

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run frontend unit tests
        run: npm --prefix frontend run test:unit -- --run

      - name: Run frontend type-check
        run: npm --prefix frontend run type-check


  push-to-prototype:
    name: Push To prototype
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-tests
    if: github.event_name == 'push' && github.ref_name != 'prototype' && github.actor != 'github-actions[bot]'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Push tested commit to prototype
        run: git push origin HEAD:prototype
