[project]
name = "lx-annotate"
revision = "1.0"

[profiles.default]
# --- Directories & Paths ---
DATA_DIR = { description = "Canonical public runtime root for imports, exports, logs, and operational files", default = "data" }
STORAGE_DIR = { description = "Managed storage subtree, usually under LX_ANNOTATE_ENCRYPTED_DATA_DIR/storage", default = "data/storage" }
LX_ANNOTATE_ENCRYPTED_DATA_DIR = { description = "Canonical protected runtime root for patient data and service-managed state", default = "" }
LX_ANNOTATE_MASTER_KEY = { description = "Service KEK as urlsafe base64 for envelope encryption", default = "" }
LX_ANNOTATE_MASTER_KEY_FILE = { description = "File containing the service KEK for envelope encryption", default = "" }
EXPORT_OUTPUT_DIR = { description = "Default path for export of annotated data", default = "data/export" }
ASSET_DIR = { description = "Path to assets directory", default = "tests/assets" }
HOME_DIR = { description = "Service home directory", default = "." }
WORKING_DIR = { description = "Current working directory", default = "." }
# --- AI & HuggingFace Models ---
HF_HOME = { description = "HuggingFace Home", default = "data/model_weights" }
HF_HUB_CACHE = { description = "HuggingFace Hub Cache", default = "data/model_weights/hub" }
TRANSFORMERS_CACHE = { description = "Transformers Cache", default = "data/model_weights/transformers" }
OLLAMA_MODELS = { description = "Ollama Models Directory", default = "data/model_weights/ollama" }
OLLAMA_KEEP_ALIVE = { description = "Ollama Keep Alive Duration", default = "5m" }
HF_HUB_ENABLE_HF_TRANSFER = { description = "Enable fast HF transfers", default = "0" }
ENABLE_FILE_WATCHER = { description = "flag that controls file watcher", default = "TRUE"}
# --- Database Configuration ---
DJANGO_DB_ENGINE = { description = "Database Engine", default = "django.db.backends.postgresql" }
DEV_DB_ENGINE = { description = "Dev Database Engine", default = "django.db.backends.postgresql" }
TEST_DB_ENGINE = { description = "Test Database Engine", default = "django.db.backends.postgresql" }
DJANGO_DB_NAME = { description = "Database Name", default = "lxAnnotateLocal" }
DEV_DB_NAME = { description = "Development Database Name", default = "lxAnnotateLocal" }
TEST_DB_NAME = { description = "Test Database Name", default = "lxAnnotateTest" }
DJANGO_DB_USER = { description = "Database User", default = "lxAnnotateLocal" }
DJANGO_DB_PASSWORD = { description = "Database Password", default = "changeme_db_password" }
DJANGO_DB_PASSWORD_FILE = { description = "File for db password", default = ".conf/db_pwd"}
DJANGO_DB_HOST = { description = "Database Host", default = "localhost" }
DJANGO_DB_PORT = { description = "Database Port", default = "5432" }

# --- Security settings
ALLOWED_HOSTS = { description = "Allowed host addresses", default = "lx-annotate.net,localhost,127.0.0.1" }
DJANGO_CORS_ALLOWED_HOSTS = { description = "Cors Hosts", default = "https://lx-annotate.local,http://127.0.0.1:3000" }
DJANGO_CORS_ALLOWED_ORIGINS = { description = "Cors Origins", default = "https://lx-annotate.local,http://127.0.0.1:3000" }
DJANGO_CSRF_TRUSTED_ORIGINS = { description = "Cors Origins", default = "https://lx-annotate.local,http://127.0.0.1:3000" }
# --- Django Core Settings ---
DJANGO_ENV = { description = "Django Environment Mode", default = "development" }
DJANGO_DEBUG = { description = "Debug Mode", default = "False" }
VITE_ENABLE_DEBUG = { description = "Frontend debug panels", default = "false" }
DJANGO_SECRET_KEY = { description = "Django Secret Key", default = "changeme_secret_key_dev_must_be_over_32_chars_long_xyz" }
DJANGO_SECRET_KEY_FILE = { description = "Optional file containing Django secret key material for stable runtime derivation", default = "" }
SECRET_KEY = { description = "Legacy Secret Key", default = "changeme_secret_key_dev" }
DJANGO_SALT = { description = "Django Salt", default = "changeme_salt_dev" }
DJANGO_SETTINGS_MODULE = { description = "Active Settings Module", default = "lx_annotate.settings.settings_prod" }
DJANGO_SETTINGS_MODULE_DEVELOPMENT = { description = "Dev Settings Module", default = "lx_annotate.settings.settings_dev" }
DJANGO_SETTINGS_MODULE_PRODUCTION = { description = "Prod Settings Module", default = "lx_annotate.settings.settings_prod" }
TIME_ZONE = { description = "Time Zone", default = "Europe/Berlin" }
CENTER_NAME = { description = "Center Name", default = "Default Center" }
ENDOSCOPY_PROCESSOR_NAME = { description = "Default endoscopy processor name for local import utilities", default = "" }

# --- Network & URLs ---
DJANGO_HOST = { description = "Django Host", default = "localhost" }
DJANGO_PORT = { description = "Django Port", default = "8000" }
STATIC_URL = { description = "Static URL", default = "/static/" }
MEDIA_URL = { description = "Media URL", default = "/protected_media/" }
PROTECTED_MEDIA_ROOT = { description = "Protected media root for Nginx internal handoff", default = "data/storage" }
LX_ANNOTATE_STREAMABLE_VIDEO_ROOT = { description = "Root for streamable video storage", default = "data/storage/streamable_videos" }
LX_ANNOTATE_STREAMABLE_VIDEO_RAW_ROOT = { description = "Root for raw streamable videos", default = "data/storage/streamable_videos/raw" }
LX_ANNOTATE_STREAMABLE_VIDEO_PROCESSED_ROOT = { description = "Root for processed streamable videos", default = "data/storage/streamable_videos/processed" }
DJANGO_STATIC_ROOT = { description = "Static root for django file serving", default = "staticfiles"}
EXEMPT_URLS = { description = "Urls exempt from Keycloak", default = "^/accounts/login/$"}
HTTP_PROTOCOL = { description = "HTTP mode", default = "https"}
# --- Authentication (Keycloak/OIDC) ---
ENFORCE_AUTH = { description = "Enforce Authentication", default = "True" }
OIDC_RP_CLIENT_ID = { description = "OIDC Client ID", default = "endoregdb-api" }
OIDC_RP_CLIENT_SECRET = { description = "OIDC Client Secret", default = "changeme_oidc_secret" }
LOGIN_URL = { default = "/accounts/login/"}
# --- Video Processing & Tests ---
ENDOREG_STORAGE_PROFILE = { description = "Video/report storage routing profile", default = "hybrid_default" }
VIDEO_DEFAULT_FPS = { description = "Default FPS for video processing", default = "25" }
VIDEO_ALLOW_FPS_FALLBACK = { description = "Allow FPS Fallback", default = "True" }
LABEL_VIDEO_SEGMENT_MIN_DURATION_S_FOR_ANNOTATION = { description = "Min duration for annotation", default = "3" }
DJANGO_FFMPEG_EXTRACT_FRAME_BATCHSIZE = { description = "FFmpeg batch size", default = "500" }
FFMPEG_TRANSCODE_TIMEOUT_SECONDS = { description = "Timeout in seconds for ffmpeg transcode operations", default = "3600" }
FFMPEG_EXECUTABLE = { description = "Explicit ffmpeg executable path", default = "" }
FFMPEG_BINARY = { description = "Legacy alias for explicit ffmpeg executable path", default = "" }
FFMPEG_PATH = { description = "Legacy alias for ffmpeg executable or containing directory", default = "" }
RUN_VIDEO_TESTS = { description = "Run Video Tests", default = "False" }
SKIP_EXPENSIVE_TESTS = { description = "Skip Expensive Tests", default = "True" }
TEST_RUN = { description = "Is Test Run", default = "False" }
TEST_RUN_FRAME_NUMBER = { description = "Frames to process in test", default = "500" }
TEST_DISABLE_MIGRATIONS = { description = "Disable migrations during test", default = "False" }
VIDEO_POST_VALIDATION_JOB_MAX_WORKERS = { description = "Maximum local worker threads for post-validation rebuild jobs", default = "2" }
VIDEO_POST_VALIDATION_JOB_MODE = { description = "Dispatch mode for post-validation rebuild jobs", default = "celery" }


# --- System & Throttling ---
RUST_BACKTRACE = { description = "Rust Backtrace", default = "1" }
DRF_THROTTLE_ANON = { description = "Anon User Throttle", default = "100/day" }
DRF_THROTTLE_USER = { description = "Auth User Throttle", default = "1000/day" }
BASE_URL = { description = "The Url for the Frontend", default = "https://lx-annotate.local"}
SECRETSPEC_PROFILE = {default = "production"}
NGINX_PROTECTED_MEDIA_URL = {default="/protected_media/"}
SERVE_WITH_NGINX = { default = "True"}
ENDOREG_REPORT_PDF_RENDERER_BIN = { description = "Path to the report_pdf_renderer binary", default = "" }
ENDOREG_DISABLE_RECONCILIATION = { description = "Disable startup reconciliation when set to 1", default = "0" }
LX_ANONYMIZER_PATH = { description = "Optional path override for lx-anonymizer integration", default = "" }
OLLAMA_BIN = { description = "Optional explicit path to the Ollama executable", default = "" }

# --- Watcher dirs ---

WATCHER_VIDEO_DIR = { description = "watcher entrypoint for videos", default = "data/import/video_import" }
WATCHER_REPORT_DIR = { description = "watcher entrypoint for reports", default = "data/import/video_import" }
WATCHER_POLL_INTERVAL_SECONDS = { description = "Polling interval for filesystem watcher service", default = "5" }
WATCHER_STABLE_AFTER_SECONDS = { description = "Minimum file age before watcher processing starts", default = "10" }


[profiles.development]
DJANGO_SETTINGS_MODULE= {description = "Settings Module", default = "lx_annotate.settings.settings_dev"}
DJANGO_DEBUG = {default="True"}
SERVE_WITH_NGINX = {default="False"}
LOG_LEVEL = {default="DEBUG"}


[profiles.production]
DJANGO_SETTINGS_MODULE= {description = "Settings Module", default = "lx_annotate.settings.settings_prod"}
DJANGO_DEBUG = {default="False"}
SERVE_WITH_NGINX = {default="False"}
NGINX_PROTECTED_MEDIA_URL = {default="/protected_media/"}
LOG_LEVEL = {default="INFO"}
