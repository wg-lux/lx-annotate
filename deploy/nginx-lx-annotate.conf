upstream lx_annotate_app {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 443 ssl http2;
    server_name lx-annotate.local;

    # Set your real certificate paths here.
    ssl_certificate /var/lib/lx-annotate/ssl/fullchain.pem;
    ssl_certificate_key /var/lib/lx-annotate/ssl/privkey.pem;

    client_max_body_size 50G;
    proxy_request_buffering off;

    location /static/ {
        alias /var/lib/lx-annotate/staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /media/ {
        alias /var/lib/lx-annotate/data/;
        sendfile on;
        tcp_nopush on;
    }

    location /protected_media/ {
        alias /var/lib/lx-annotate/data/;
        internal;
        sendfile on;
        tcp_nopush on;
    }

    location / {
        proxy_pass http://lx_annotate_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Accel-Redirect "";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }
}
