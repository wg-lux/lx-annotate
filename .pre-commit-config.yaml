repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.7
    hooks:
      - id: ruff
        args: ["--fix", "lx_annotate", "tests"]
        pass_filenames: false
      - id: ruff-format
        args: ["lx_annotate", "tests"]
        pass_filenames: false
  - repo: local
    hooks:
      - id: mypy
        name: mypy type check
        entry: ./.devenv/profile/bin/uv run mypy lx_annotate
        language: system
        pass_filenames: false
        env:
          UV_PROJECT_ENVIRONMENT: .devenv/state/venv
      - id: pytest
        name: pytest suite
        entry: ./.devenv/profile/bin/uv run pytest
        language: system
        pass_filenames: false
        env:
          UV_PROJECT_ENVIRONMENT: .devenv/state/venv
      - id: mypy
        name: mypy type check
        entry: ./.devenv/profile/bin/uv run mypy lx_annotate
        language: system
        pass_filenames: false
        env:
          UV_PROJECT_ENVIRONMENT: .devenv/state/venv

      - id: frontend-vitest
        name: frontend vitest
        entry: bash -lc 'cd frontend && npm run test:unit -- --run'
        language: system
        pass_filenames: false

      - id: frontend-typecheck
        name: frontend type-check
        entry: bash -lc 'cd frontend && npm run type-check'
        language: system
        pass_filenames: false

